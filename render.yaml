databases:
  - name: jala-ride-db
    plan: free
    databaseName: jalaride
    user: jalaride

services:
  - type: web
    name: jala-ride-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma db push && npx prisma db seed && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jala-ride-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 4000
      - key: HOST
        value: 0.0.0.0
