<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1B6B3A" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d4a6a"/>
      <stop offset="100%" stop-color="#132036"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#sky)"/>
  <ellipse cx="400" cy="520" rx="380" ry="40" fill="#0a1628" opacity="0.5"/>
  <rect x="0" y="420" width="800" height="180" fill="url(#road)"/>
  <line x1="0" y1="480" x2="800" y2="480" stroke="#D4A017" stroke-width="2" stroke-dasharray="40 30" opacity="0.5"/>
  <!-- Car 1 -->
  <g transform="translate(120, 400)">
    <rect x="0" y="20" width="120" height="40" rx="8" fill="#1B6B3A"/>
    <rect x="20" y="0" width="80" height="30" rx="6" fill="#1B6B3A"/>
    <circle cx="25" cy="60" r="14" fill="#0a1628" stroke="#D4A017" stroke-width="3"/>
    <circle cx="95" cy="60" r="14" fill="#0a1628" stroke="#D4A017" stroke-width="3"/>
  </g>
  <!-- Car 2 -->
  <g transform="translate(480, 380)">
    <rect x="0" y="20" width="140" height="45" rx="8" fill="#132036" stroke="#D4A017" stroke-width="2"/>
    <rect x="25" y="0" width="90" height="32" rx="6" fill="#132036" stroke="#D4A017" stroke-width="2"/>
    <circle cx="30" cy="65" r="15" fill="#0a1628" stroke="#1B6B3A" stroke-width="3"/>
    <circle cx="110" cy="65" r="15" fill="#0a1628" stroke="#1B6B3A" stroke-width="3"/>
  </g>
  <!-- Building silhouettes -->
  <rect x="40" y="200" width="60" height="220" fill="#132036" opacity="0.8"/>
  <rect x="120" y="160" width="80" height="260" fill="#1a2d4a" opacity="0.9"/>
  <rect x="600" y="180" width="70" height="240" fill="#132036" opacity="0.8"/>
  <rect x="690" y="220" width="50" height="200" fill="#1a2d4a"/>
  <text x="400" y="100" text-anchor="middle" fill="#D4A017" font-size="28" font-weight="bold" font-family="system-ui">Government Fleet</text>
  <text x="400" y="135" text-anchor="middle" fill="#a0aec0" font-size="16" font-family="system-ui">Verified · Insured · Tracked</text>
</svg>
