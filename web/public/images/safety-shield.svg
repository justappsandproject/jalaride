<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 400" fill="none">
  <defs>
    <linearGradient id="shield" x1="240" y1="40" x2="240" y2="360">
      <stop offset="0%" stop-color="#1B6B3A"/>
      <stop offset="100%" stop-color="#0d4024"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <path d="M240 40 L400 100 L400 220 C400 300 240 360 240 360 C240 360 80 300 80 220 L80 100 Z" fill="url(#shield)" stroke="#D4A017" stroke-width="3" filter="url(#glow)"/>
  <path d="M240 90 L340 130 L340 210 C340 260 240 300 240 300 C240 300 140 260 140 210 L140 130 Z" fill="#0a1628" opacity="0.6"/>
  <text x="240" y="175" text-anchor="middle" fill="#D4A017" font-size="48" font-family="system-ui"></text>
  <text x="240" y="220" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="system-ui">NIN · DSS · POLICE</text>
  <circle cx="120" cy="320" r="8" fill="#38a169"><animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="240" cy="340" r="8" fill="#D4A017"><animate attributeName="r" values="8;12;8" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle>
  <circle cx="360" cy="320" r="8" fill="#38a169"><animate attributeName="r" values="8;12;8" dur="2s" begin="1s" repeatCount="indefinite"/></circle>
  <text x="120" y="355" text-anchor="middle" fill="#a0aec0" font-size="11" font-family="system-ui">Identity</text>
  <text x="240" y="365" text-anchor="middle" fill="#a0aec0" font-size="11" font-family="system-ui">Clearance</text>
  <text x="360" y="355" text-anchor="middle" fill="#a0aec0" font-size="11" font-family="system-ui">Screening</text>
</svg>
